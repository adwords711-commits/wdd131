<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Recepi book with homemade recipes.">
    <meta name="author" content="Jorge Gonzales">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Recipe Book</title>
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Recepi book with homemade recipes">
    <meta property="og:url" content="yourgithubusername.github.io/wdd131/recipes">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/krk2scv.css">
</head>
<body>
<header class="site-header">
    <div class="logo-title">
        <img src="images/recipe-book.png" alt="Recipe Book Logo">
        <h1>Recipe Book</h1>
    </div>
    <div class="search-box">
        <input type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="Search icon" class="search-icon">
    </div>

</header>
<main>
    <section class="recipe-card">
        <div class="recipe-image">
            <img src="images/apple-crisp.jpg" alt="Apple apple-crisp Dessert">
        </div>

        <div class="recipe-info">
            <button class="dessert">dessert</button>
            <h2>Apple Crisp</h2>   
            <span
            class="rating"
            role="img"
            aria-label="Rating: 4 out of 5 stars"
            >
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
            </span>
            
            <p class="recipe-description">
                This apple crisp is a simple yet delicious fall<br>
                desert that's great served warm with vanilla icecream.
            </p>
        </div>
    </section>
</main>

<footer>
    <p>
      <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>          
    </p>
    <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>

            
</footer>
    
</body>
</html>
