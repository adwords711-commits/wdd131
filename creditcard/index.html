<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Form</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="form.css">
    <script src="form.js" defer></script>
</head>
<body>
  <main>
    <div class="errors"></div>

    <form id="checkoutForm" action="completed.html" method="get">
      <div id="formGrid">
        
        <div class="card front">
          <div class="total">TOTAL: $199</div>
          <div class="card-icon">💳</div>

          <div class="field card-number">
            <label for="creditCardNumber">CARD NUMBER</label>
            <input 
              type="text" 
              id="creditCardNumber" 
              name="creditCardNumber" 
              placeholder="1234 5678 9101 1020" 
              required 
            >
          </div>

          <div class="field card-holder">
            <label for="cardHolder">CARD HOLDER</label>
            <input 
              type="text" 
              id="cardHolder" 
              name="cardHolder" 
              placeholder="John Doe" 
              required 
            >
          </div>

          <div class="field expiration" id="cardExpiration">
            <label id="expirationDate">EXPIRATION</label>

            <input 
              type="text"
              id="month" 
              name="expMonth" 
              placeholder="MM" 
              aria-labelledby="expirationDate" 
              required 
            >
            <input 
              type="text" 
              id="year" 
              name="expYear" 
              placeholder="YY" 
              aria-labelledby="expirationDate" 
              required 
            >
          </div>
        </div>
        
        <div class="card back">
          <div class="swipe"></div>
          <div class="field cvc">
            <label for="cvc">CVC/CVV</label>
            <input 
              type="text" 
              id="cvc" 
              name="cvc" 
              placeholder="xxx" 
              maxlength="3" 
              required 
            >
          </div>
        </div>
        
        <button type="submit">Submit</button>
      </div>
    </form>
  </main>
</body>
</html>
