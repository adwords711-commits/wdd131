<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Book your hair appointment at Jhovannas Hair Salon.">
    <meta name="author" content="Jhovannas Hair Salon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Online | Jhovannas Hair Salon</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
    <div class="logo-title">
        <img src="images/logo.png" alt="Salon Logo">
        <h1>Jhovannas Hair Salon</h1>
    </div>

    <nav class="nav">
        <a href="index.html">Services</a>
        <a href="booking.html">Book Online</a>
    </nav>
</header>

<main>

    <section class="booking-intro">
        <h2>Book Your Appointment</h2>
        <p>Select your service and preferred time below.</p>
    </section>

    <section class="booking-form-section">

        <form class="booking-form">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="First and Last Name" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="(000) 000-0000">

            <label for="service">Select Service</label>
            <select id="service" required>
                <option value="">-- Choose a Service --</option>
                <option>Haircut</option>
                <option>Balayage</option>
                <option>Hair Color</option>
                <option>Deep Conditioning Treatment</option>
                <option>Blowout</option>
            </select>

            <label for="date">Preferred Date</label>
            <input type="date" id="date" required>

            <label for="time">Preferred Time</label>
            <input type="time" id="time" required>

            <button type="submit">Book Appointment</button>

        </form>

    </section>

</main>

<footer>
    <p>&copy; 2026 Jhovannas Hair Salon</p>

    <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="Instagram"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="YouTube"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest"></a>
    </div>
</footer>

</body>
</html>
