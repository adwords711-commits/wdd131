<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Character Card</title>

    <!-- Social Media Meta Tags (Required) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A fantasy character card showing stats and actions built with JavaScript objects.">
    <meta property="og:url" content="https://adwords711-commits.github.io/wdd131/charactercard">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

</head>
<body>
    <div class="card">
        <img class="image" id="characterImage" src="images/snortleblat.png" alt="Character Image">
        <div class="name" id="characterName"></div>

        <div class="stats">
            <p>Class: <span id="characterClass"></span></p>
            <p>Level: <span id="characterLevel"></span></p>
            <p>Health: <span id="characterHealth"></span></p>
        </div>
        <div class="buttons">
            <button id="attackBtn">Attack</button>
            <button id="levelUpBtn">Level Up</button>
        </div>
    </div>
    
</body>
</html>
